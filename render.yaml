services:
  - type: web
    name: ged-backend
    env: node
    region: paris
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_HOST
        fromDatabase:
          name: ged-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ged-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: ged-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: ged-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ged-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://your-frontend-app.onrender.com

  - type: mysql
    name: ged-db
    region: paris
    plan: free
    envVars:
      - key: MYSQL_DATABASE
        value: ged_db
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
